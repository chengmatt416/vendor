<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <style>
    body { touch-action: pan-y; } /* 允許垂直捲動，但禁止水平手勢 */
    .signature-wrapper { 
      border: 2px dashed #666; 
      border-radius: 8px; 
      background: #fff; 
      height: 200px;
      position: relative;
    }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body class="bg-light">
<div id="app" class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow border-0">
        <div class="card-header bg-white py-3"><h4 class="mb-0 fw-bold">✍️ 訂單簽收系統</h4></div>
        <div class="card-body">
          
          <div class="input-group mb-4">
            <input type="text" class="form-control" v-model="keyword" placeholder="輸入姓名查詢..." @keyup.enter="search">
            <button class="btn btn-primary" @click="search" :disabled="loading">{{ loading ? '搜尋中...' : '🔍' }}</button>
          </div>

          <div v-if="orders.length > 0">
            <p class="text-muted small mb-2">請勾選要簽收的項目：</p>
            <div class="list-group mb-3">
              <label class="list-group-item d-flex align-items-center" v-for="order in orders" :key="order.orderId">
                <input class="form-check-input me-3" type="checkbox" v-model="selectedOrders" :value="order" style="transform: scale(1.3);">
                <div class="w-100">
                  <div class="d-flex justify-content-between">
                    <strong>{{ order.product }} x{{ order.qty }}</strong>
                    <span class="text-danger">${{ order.total }}</span>
                  </div>
                  <div class="small text-muted d-flex justify-content-between">
                    <span>{{ order.date }}</span>
                    <span v-if="order.email">✉️ {{ order.email }}</span>
                    <span v-else class="text-warning">⚠️ 無Email</span>
                  </div>
                </div>
              </label>
            </div>
            
            <div v-if="selectedOrders.length > 0" class="mt-4 border-top pt-3">
              <div class="mb-3">
                <label class="form-label fw-bold">簽收人姓名</label>
                <input type="text" class="form-control" v-model="signerName">
              </div>

              <label class="form-label fw-bold">請簽名</label>
              <div class="signature-wrapper">
                <canvas id="sign-canvas"></canvas>
              </div>
              <div class="d-flex justify-content-end mt-2">
                <button class="btn btn-sm btn-outline-secondary" @click="clearPad">清除重寫</button>
              </div>

              <div class="d-grid mt-4">
                <button class="btn btn-success btn-lg" @click="submit" :disabled="submitting">
                  {{ submitting ? '處理中...' : '確認簽收' }}
                </button>
              </div>
            </div>
          </div>
          
          <div v-else-if="searched" class="text-center py-5 text-muted">查無資料</div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const { createApp, nextTick } = Vue;
  createApp({
    data() { return { keyword: '', loading: false, searched: false, submitting: false, orders: [], selectedOrders: [], signerName: '', pad: null } },
    
    watch: {
      // 邏輯核心：監聽「已選訂單」的變化
      selectedOrders(newVal) {
        if (newVal.length > 0) {
          // 如果有勾選，且 Canvas 尚未初始化 -> 等待 DOM 更新後初始化
          if (!this.pad) {
            nextTick(() => {
              // 加上一個微小的延遲，確保 v-if 動畫或渲染完全結束
              setTimeout(() => this.initPad(), 200);
            });
          }
        } else {
          // 如果全部取消勾選 -> 清除 Pad 物件
          this.pad = null;
        }
      }
    },

    methods: {
      search() {
        if(!this.keyword) return;
        this.loading = true; this.searched = false; this.selectedOrders = []; this.orders = []; this.pad = null;
        google.script.run.withSuccessHandler(res => {
          this.orders = res;
          this.loading = false; 
          this.searched = true;
        }).findOrdersByName(this.keyword);
      },

      initPad() {
        const canvas = document.getElementById('sign-canvas');
        if (!canvas) { console.error("Canvas element not found!"); return; }
        
        // 修正視網膜螢幕/手機解析度模糊問題
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        
        this.pad = new SignaturePad(canvas, { backgroundColor: 'rgba(255, 255, 255, 0)' });
        console.log("Pad initialized successfully");
      },

      clearPad() { if(this.pad) this.pad.clear(); },

      submit() {
        if(!this.signerName) return alert('請輸入姓名');
        if(!this.pad || this.pad.isEmpty()) return alert('請簽名');
        
        this.submitting = true;
        const payload = {
          orders: JSON.parse(JSON.stringify(this.selectedOrders)),
          signerName: this.signerName,
          signature: this.pad.toDataURL()
        };

        google.script.run.withSuccessHandler(res => {
          this.submitting = false;
          if(res.success) {
            alert('✅ 簽收成功！\n' + res.message); // 這裡會顯示 Email 寄送結果
            if(res.downloadUrl) window.open(res.downloadUrl, '_blank');
            this.search(); // 重整
          } else {
            alert('❌ 失敗: ' + res.error);
          }
        }).submitSignoff(payload);
      }
    }
  }).mount('#app');
</script>
</body>
</html>
